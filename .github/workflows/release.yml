name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  macos:
    name: arm64-darwin
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: System deps
        run: brew install sqlite libev pkg-config dylibbundler

      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: '5.1'

      - run: opam install --deps-only -y .

      - run: opam exec -- dune build --profile release bin/main.exe

      - name: Bundle dylibs
        id: stage
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          tarball="urme-${version}-arm64-darwin.tar.gz"
          mkdir -p dist/lib
          cp _build/default/bin/main.exe dist/urme
          chmod +x dist/urme
          # Copy non-system dylibs into dist/lib/ and rewrite the
          # binary's install names to @executable_path/lib/<dylib>.
          # Brew's symlink in bin/ resolves @executable_path to the
          # libexec location where we ship both urme and lib/.
          dylibbundler -od -b -x dist/urme -d dist/lib -p '@executable_path/lib/'
          tar -C dist -czf "$tarball" urme lib
          shasum -a 256 "$tarball" | tee "$tarball.sha256"
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.stage.outputs.tarball }}
            ${{ steps.stage.outputs.tarball }}.sha256
          generate_release_notes: true

  linux:
    name: x86_64-linux
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: System deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libev-dev libsqlite3-dev libgmp-dev libssl-dev \
            pkg-config patchelf

      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: '5.1'

      - run: opam install --deps-only -y .

      - run: opam exec -- dune build --profile release bin/main.exe

      - name: Bundle .so files
        id: stage
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          tarball="urme-${version}-x86_64-linux.tar.gz"
          mkdir -p dist/lib
          cp _build/default/bin/main.exe dist/urme
          chmod +x dist/urme
          # Copy every non-system .so the binary needs into dist/lib/.
          # Skip the dynamic loader, glibc, and components universally
          # present on glibc-based distros.
          skip='^/lib64/ld-linux|^linux-vdso|/(libc|libm|libdl|libpthread|libgcc_s|librt|libresolv|libutil|libstdc\+\+)\.so'
          ldd dist/urme | awk '/=> \// {print $3}' | sort -u \
            | grep -Ev "$skip" \
            | xargs -I{} cp -L {} dist/lib/
          # Set RPATH so the binary resolves bundled libs first.
          patchelf --set-rpath '$ORIGIN/lib' dist/urme
          echo "--- after bundling ---"
          file dist/urme
          ldd dist/urme
          ls -lh dist/lib/
          tar -C dist -czf "$tarball" urme lib
          sha256sum "$tarball" | tee "$tarball.sha256"
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.stage.outputs.tarball }}
            ${{ steps.stage.outputs.tarball }}.sha256
          generate_release_notes: true
